<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Run the same Claude Code task across multiple config variants and compare results"
    />
    <title>agent-benchmark</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-code: #f6f8fa;
        --bg-code-block: #f6f8fa;
        --border: #d0d7de;
        --text: #1f2328;
        --text-muted: #656d76;
        --link: #0969da;
        --link-hover: #0550ae;
        --heading-border: #d0d7de;
        --table-row-alt: #f6f8fa;
        --sidebar-bg: #f6f8fa;
        --sidebar-width: 260px;
        --accent: #0969da;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --bg-code: #161b22;
          --bg-code-block: #161b22;
          --border: #30363d;
          --text: #e6edf3;
          --text-muted: #7d8590;
          --link: #58a6ff;
          --link-hover: #79c0ff;
          --heading-border: #30363d;
          --table-row-alt: #161b22;
          --sidebar-bg: #161b22;
          --accent: #58a6ff;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Helvetica,
          Arial,
          sans-serif;
        font-size: 16px;
        line-height: 1.7;
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover {
        color: var(--link-hover);
        text-decoration: underline;
      }

      /* ── Layout ── */

      .layout {
        display: flex;
        min-height: 100vh;
        max-width: 1200px;
        margin: 0 auto;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        width: var(--sidebar-width);
        flex-shrink: 0;
        overflow-y: auto;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        padding: 1.5rem 1rem;
      }

      .sidebar-title {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin: 0 0 0.75rem 0.25rem;
      }

      #toc {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      #toc li {
        margin: 0;
        padding: 0;
      }

      #toc a {
        display: block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        color: var(--text);
        font-size: 0.875rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #toc a:hover {
        background: var(--border);
        text-decoration: none;
      }

      #toc .toc-h2 {
        padding-left: 0.5rem;
      }

      #toc .toc-h3 {
        padding-left: 1.25rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .content {
        flex: 1;
        min-width: 0;
        padding: 2.5rem 3rem 4rem;
        max-width: 860px;
      }

      /* ── Headings ── */

      .content h1,
      .content h2,
      .content h3,
      .content h4 {
        margin-top: 1.75em;
        margin-bottom: 0.5em;
        line-height: 1.3;
        font-weight: 600;
      }

      .content h1 {
        font-size: 2rem;
        border-bottom: 1px solid var(--heading-border);
        padding-bottom: 0.4em;
        margin-top: 0;
      }

      .content h2 {
        font-size: 1.4rem;
        border-bottom: 1px solid var(--heading-border);
        padding-bottom: 0.3em;
      }

      .content h3 {
        font-size: 1.1rem;
      }

      /* ── Code ── */

      .content code {
        background: var(--bg-code);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.1em 0.4em;
        font-size: 0.875em;
        font-family: ui-monospace, 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      }

      .content pre {
        background: var(--bg-code-block);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1rem 1.25rem;
        overflow-x: auto;
        line-height: 1.5;
      }

      .content pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.875em;
      }

      /* ── Tables ── */

      .content table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
        margin: 1.25rem 0;
        display: block;
        overflow-x: auto;
      }

      .content th,
      .content td {
        border: 1px solid var(--border);
        padding: 0.5rem 0.75rem;
        text-align: left;
      }

      .content th {
        background: var(--bg-code);
        font-weight: 600;
      }

      .content tr:nth-child(even) td {
        background: var(--table-row-alt);
      }

      /* ── Blockquote / HR / Lists ── */

      .content blockquote {
        margin: 1rem 0;
        padding: 0.5rem 1rem;
        border-left: 4px solid var(--border);
        color: var(--text-muted);
      }

      .content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }

      .content ul,
      .content ol {
        padding-left: 1.75rem;
      }

      .content li + li {
        margin-top: 0.25rem;
      }

      /* ── Responsive: hide sidebar on small screens ── */

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }

        .content {
          padding: 1.5rem 1.25rem 3rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <nav class="sidebar" aria-label="Table of contents">
        <p class="sidebar-title">Contents</p>
        <ul id="toc"></ul>
      </nav>
      <main class="content" id="main-content">
        <!-- CONTENT -->
      </main>
    </div>

    <script>
      // Build table of contents from rendered headings
      (function () {
        const toc = document.getElementById('toc');
        const content = document.getElementById('main-content');
        const headings = content.querySelectorAll('h1, h2, h3');

        headings.forEach(function (h, i) {
          if (!h.id) {
            h.id =
              'heading-' +
              i +
              '-' +
              h.textContent
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-');
          }
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = h.textContent;
          a.className = 'toc-' + h.tagName.toLowerCase();
          li.appendChild(a);
          toc.appendChild(li);
        });

        // Highlight active section while scrolling
        const observer = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (entry) {
              const link = toc.querySelector('a[href="#' + entry.target.id + '"]');
              if (!link) return;
              if (entry.isIntersecting) {
                toc.querySelectorAll('a').forEach(function (a) {
                  a.style.fontWeight = '';
                  a.style.color = '';
                });
                link.style.fontWeight = '600';
                link.style.color = 'var(--accent)';
              }
            });
          },
          { rootMargin: '0px 0px -80% 0px' },
        );

        headings.forEach(function (h) {
          observer.observe(h);
        });
      })();
    </script>
  </body>
</html>
